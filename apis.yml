aid: tettra
name: Tettra
description: >-
  Tettra is an AI-powered knowledge management system that helps teams curate
  company policies, processes, and knowledge articles into a searchable internal
  wiki. It provides a REST API for managing pages, categories, and Q&A workflows,
  with an AI assistant (Kai) integrated directly into Slack and Microsoft Teams
  to answer repetitive questions from your knowledge base automatically.
